# traefik.yml — Development
global:
  checkNewVersion: false      # no outbound version-check call on startup
  sendAnonymousUsage: false   # no telemetry phone-home

log:
  level: WARN

api:
  dashboard: true
  insecure: false   # no unauthenticated API on :8080 — dashboard is served only
                    # through the secured file-router (traefik-dashboard) on the
                    # loopback-bound 'dashboard' entrypoint below

ping: {}

metrics:
  prometheus:
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    entryPoint: metrics

providers:
  # File provider only — no Docker provider, so the Docker socket is never
  # mounted (the socket is equivalent to host root). All routers/services are
  # declared statically in dynamic_conf.yml; backends resolve over the Docker
  # network's embedded DNS by container name (e.g. http://auth_user_service:8000).
  file:
    filename: /etc/traefik/dynamic_conf.yml
    watch: true

entryPoints:
  web:
    address: ":80"
    http:
      # v3.7 hardening: reject requests whose path contains these encoded
      # characters instead of forwarding them. Permissive defaults (true) let
      # Traefik and the backend decode paths differently — a "split-view" that
      # can bypass path-based routing/auth. Setting them false is Traefik's
      # documented recommendation; the auth/fastapi backends use plain REST
      # paths so nothing legitimate breaks. NOTE: the "encoded characters" WARN
      # Traefik logs once at startup is an unconditional v3.7 migration notice
      # and is NOT suppressed by these options (fires with true or false alike).
      encodedCharacters:
        allowEncodedSlash: false
        allowEncodedBackSlash: false
        allowEncodedNullCharacter: false
        allowEncodedSemicolon: false
        allowEncodedPercent: false
        allowEncodedQuestionMark: false
        allowEncodedHash: false
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http3: {}            # HTTP/3 / QUIC — requires UDP port mapping (see docker-compose.yml)
    http:
      # Intentionally false (path hardening). The startup "encoded characters"
      # WARN is an unconditional v3.7 migration notice — see the 'web' note above.
      encodedCharacters:
        allowEncodedSlash: false
        allowEncodedBackSlash: false
        allowEncodedNullCharacter: false
        allowEncodedSemicolon: false
        allowEncodedPercent: false
        allowEncodedQuestionMark: false
        allowEncodedHash: false
    forwardedHeaders:
      trustedIPs:
        - "127.0.0.1/32"
        - "172.16.0.0/12"   # Docker bridge networks
        - "::1/128"
  api:
    address: ":9000"     # Internal service-to-service entryPoint — TCP only, no HTTP/3
    http:
      # Intentionally false (path hardening). The startup "encoded characters"
      # WARN is an unconditional v3.7 migration notice — see the 'web' note above.
      encodedCharacters:
        allowEncodedSlash: false
        allowEncodedBackSlash: false
        allowEncodedNullCharacter: false
        allowEncodedSemicolon: false
        allowEncodedPercent: false
        allowEncodedQuestionMark: false
        allowEncodedHash: false
    forwardedHeaders:
      trustedIPs:
        - "127.0.0.1/32"
        - "172.16.0.0/12"   # Docker bridge networks
        - "::1/128"
  metrics:
    address: ":8082"     # Prometheus scrapes traefik:8082 — internal only, not host-exposed
  # NOTE: the built-in 'traefik' entrypoint (:8080, created here by ping) hosts the
  # dashboard. It is bound to 127.0.0.1:8080 in docker-compose (loopback only) and the
  # dashboard is exposed through the secured traefik-dashboard file-router (TLS +
  # Host(localhost) + ip-allowlist), since api.insecure is off.
