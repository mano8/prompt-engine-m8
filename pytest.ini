[pytest]
pythonpath = .
testpaths = tests
markers =
    anyio: Async tests driven by the anyio plugin (asyncio backend only)
    live: Requires a running Docker Compose stack — run manually or nightly
addopts =
    --strict-markers
    --ignore=tests/live
    --cov=promt_engine_service
    --cov-report=term-missing
    --cov-branch
