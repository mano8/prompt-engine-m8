name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r promt_engine_service/requirements_dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy promt_engine_service --ignore-missing-imports

      - name: Security scan (bandit)
        run: bandit -r promt_engine_service -x promt_engine_service/alembic

      - name: Test (pytest)
        run: |
          if find tests -type f -name 'test*.py' | grep -q .; then
            pytest
          else
            echo "No tests found; skipping pytest."
          fi

      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r promt_engine_service/requirements_dev.txt

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}